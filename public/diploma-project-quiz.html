<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurora Atelier - дипломная викторина</title>
  <style>
    :root {
      --ink: #171514;
      --muted: #6f675e;
      --paper: #f7f0e6;
      --paper-strong: #fffaf2;
      --line: rgba(59, 44, 27, 0.16);
      --gold: #b9893b;
      --gold-dark: #7b551f;
      --rose: #b77968;
      --green: #36584b;
      --blue: #344e63;
      --danger: #9c3f35;
      --success: #3d6b4f;
      --shadow: 0 18px 48px rgba(41, 32, 22, 0.12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(54, 88, 75, 0.08) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(54, 88, 75, 0.06) 0 1px, transparent 1px 100%),
        linear-gradient(135deg, #fffaf2 0%, #f5ead9 48%, #e9eef0 100%);
      background-size: 42px 42px, 42px 42px, 100% 100%;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    select {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding: 14px 16px;
      background: rgba(255, 250, 242, 0.82);
      border: 1px solid rgba(185, 137, 59, 0.24);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(41, 32, 22, 0.08);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
    }

    .brand-title {
      display: grid;
      gap: 2px;
    }

    .brand-title strong {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 500;
      line-height: 1;
    }

    .brand-title span {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .score-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(92px, 1fr));
      gap: 8px;
      min-width: min(520px, 100%);
    }

    .metric {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.54);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 19px;
      line-height: 1.1;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 250, 242, 0.88);
      border: 1px solid rgba(59, 44, 27, 0.14);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .side {
      position: sticky;
      top: 18px;
      padding: 16px;
    }

    .side-title,
    .question-kicker,
    .small-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .side-title {
      margin: 0 0 12px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .field select {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
    }

    .tool-btn {
      min-height: 42px;
      padding: 8px 11px;
      border: 1px solid rgba(185, 137, 59, 0.28);
      border-radius: var(--radius);
      color: var(--gold-dark);
      background: rgba(255, 255, 255, 0.58);
      font-size: 13px;
      font-weight: 700;
    }

    .tool-btn:hover,
    .tool-btn.active {
      color: #fff;
      background: var(--green);
      border-color: transparent;
    }

    .category-map {
      display: grid;
      gap: 7px;
      margin-top: 13px;
    }

    .map-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.46);
      color: var(--muted);
      font-size: 13px;
    }

    .map-row strong {
      color: var(--ink);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .quiz {
      min-height: 680px;
      overflow: hidden;
    }

    .quiz-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(54, 88, 75, 0.1), rgba(185, 137, 59, 0.08));
    }

    .progress {
      display: grid;
      gap: 10px;
    }

    .progress-line {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(59, 44, 27, 0.1);
    }

    .progress-line span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--gold));
      transition: width 0.25s ease;
    }

    .visual {
      width: 114px;
      height: 82px;
      color: var(--gold-dark);
    }

    .question-card {
      padding: 24px 22px 22px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(185, 137, 59, 0.24);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.58);
      color: var(--gold-dark);
      font-size: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.05;
      font-weight: 500;
      overflow-wrap: anywhere;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    .option {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(59, 44, 27, 0.16);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.64);
      color: var(--ink);
      text-align: left;
      line-height: 1.35;
    }

    .option span:last-child {
      overflow-wrap: anywhere;
    }

    .option:hover {
      border-color: rgba(185, 137, 59, 0.58);
      box-shadow: 0 10px 22px rgba(41, 32, 22, 0.08);
      transform: translateY(-1px);
    }

    .option-index {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(54, 88, 75, 0.1);
      color: var(--green);
      font-weight: 800;
    }

    .option.correct {
      border-color: rgba(61, 107, 79, 0.7);
      background: rgba(61, 107, 79, 0.12);
    }

    .option.wrong {
      border-color: rgba(156, 63, 53, 0.66);
      background: rgba(156, 63, 53, 0.12);
    }

    .explain {
      display: none;
      margin-top: 18px;
      padding: 15px 16px;
      border-left: 4px solid var(--green);
      border-radius: var(--radius);
      background: rgba(54, 88, 75, 0.09);
      color: #26352e;
      line-height: 1.5;
    }

    .explain.visible {
      display: block;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .primary,
    .secondary {
      min-height: 44px;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-weight: 800;
    }

    .primary {
      border: 0;
      color: #fff;
      background: var(--ink);
    }

    .primary:hover {
      background: var(--green);
    }

    .secondary {
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
    }

    .secondary:hover {
      border-color: rgba(185, 137, 59, 0.56);
      color: var(--gold-dark);
    }

    .result {
      display: none;
      padding: 24px 22px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.42);
    }

    .result.visible {
      display: block;
    }

    .result h2 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 500;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .review-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 250, 242, 0.74);
      overflow-wrap: anywhere;
    }

    .review-item strong {
      display: block;
      margin-bottom: 5px;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .score-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 1320px);
        padding-top: 10px;
        padding-bottom: 22px;
      }

      .topbar {
        gap: 12px;
        margin-bottom: 14px;
        padding: 12px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
      }

      .brand-title strong {
        font-size: 27px;
      }

      .brand-title span {
        font-size: 11px;
        letter-spacing: 0.09em;
      }

      .score-strip {
        gap: 7px;
      }

      .metric {
        padding: 9px 10px;
      }

      .metric span {
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      .metric strong {
        font-size: 18px;
      }

      .layout {
        gap: 14px;
      }

      .quiz {
        order: 1;
        min-height: auto;
      }

      .side {
        order: 2;
        padding: 14px;
      }

      .quiz-head {
        grid-template-columns: 1fr;
        padding: 15px 14px;
      }

      .visual {
        display: none;
      }

      .question-card {
        padding: 18px 14px;
      }

      h1 {
        font-size: clamp(24px, 7vw, 32px);
        line-height: 1.08;
      }

      .badges {
        margin-bottom: 12px;
      }

      .options {
        gap: 9px;
        margin-top: 18px;
      }

      .option {
        grid-template-columns: 34px minmax(0, 1fr);
        min-height: 52px;
        padding: 11px 10px;
        gap: 10px;
      }

      .option-index {
        width: 30px;
        height: 30px;
      }

      .explain {
        margin-top: 14px;
        padding: 13px 14px;
      }

      .footer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .primary,
      .secondary,
      .tool-btn,
      .field select {
        min-height: 48px;
      }

      .category-map {
        max-height: 260px;
        overflow: auto;
        padding-right: 2px;
      }

      .result {
        padding: 20px 14px;
      }

      .result h2 {
        font-size: 28px;
      }
    }

    @media (max-width: 420px) {
      .app {
        width: min(100% - 12px, 1320px);
      }

      .brand {
        gap: 9px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .brand-title strong {
        font-size: 24px;
      }

      .brand-title span {
        font-size: 10px;
      }

      .question-card {
        padding: 16px 12px;
      }

      .quiz-head {
        padding: 14px 12px;
      }

      .option {
        grid-template-columns: 30px minmax(0, 1fr);
        font-size: 14px;
      }

      .footer-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="35" fill="#fff8ee" stroke="#b9893b" stroke-width="2" />
          <path d="M25 57 L39 18 L55 57" fill="none" stroke="#7b551f" stroke-width="3" stroke-linecap="round" />
          <path d="M31 45 H49" fill="none" stroke="#b9893b" stroke-width="2.5" stroke-linecap="round" />
          <path d="M56 18 L58 24 L64 26 L58 28 L56 34 L54 28 L48 26 L54 24 Z" fill="#b9893b" opacity="0.75" />
        </svg>
        <div class="brand-title">
          <strong>Aurora Atelier</strong>
          <span>Дипломная викторина</span>
        </div>
      </div>
      <div class="score-strip" aria-live="polite">
        <div class="metric"><span>Счёт</span><strong id="scoreText">0/0</strong></div>
        <div class="metric"><span>Точность</span><strong id="accuracyText">0%</strong></div>
        <div class="metric"><span>Серия</span><strong id="streakText">0</strong></div>
        <div class="metric"><span>Лучший</span><strong id="bestText">0%</strong></div>
      </div>
    </header>

    <div class="layout">
      <aside class="panel side">
        <p class="side-title">Фильтр вопросов</p>
        <label class="field">
          <span class="small-label">Раздел</span>
          <select id="categorySelect"></select>
        </label>
        <label class="field">
          <span class="small-label">Сложность</span>
          <select id="difficultySelect">
            <option value="all">Все уровни</option>
            <option value="base">База</option>
            <option value="hard">Сложные</option>
            <option value="exam">Комиссия</option>
          </select>
        </label>
        <div class="mode-grid">
          <button class="tool-btn active" id="allModeBtn" type="button">Все</button>
          <button class="tool-btn" id="missedModeBtn" type="button">Ошибки</button>
          <button class="tool-btn" id="shuffleBtn" type="button">Перемешать</button>
          <button class="tool-btn" id="resetBtn" type="button">Сбросить</button>
        </div>
        <p class="side-title">Карта банка</p>
        <div class="category-map" id="categoryMap"></div>
      </aside>

      <main class="panel quiz">
        <section class="quiz-head">
          <div class="progress">
            <div class="question-kicker" id="progressText">Вопрос 1</div>
            <div class="progress-line" aria-hidden="true"><span id="progressFill"></span></div>
          </div>
          <svg class="visual" viewBox="0 0 180 128" aria-hidden="true">
            <path d="M18 83 C44 28, 132 28, 162 83" fill="none" stroke="#36584b" stroke-width="8" stroke-linecap="round" opacity="0.35" />
            <path d="M48 82 C58 46, 82 30, 91 22 C102 32, 126 47, 135 82" fill="none" stroke="#b9893b" stroke-width="8" stroke-linecap="round" />
            <ellipse cx="91" cy="45" rx="18" ry="24" fill="#fffaf2" stroke="#344e63" stroke-width="5" />
            <circle cx="58" cy="84" r="9" fill="#fffaf2" stroke="#b9893b" stroke-width="5" />
            <circle cx="126" cy="84" r="9" fill="#fffaf2" stroke="#b9893b" stroke-width="5" />
          </svg>
        </section>

        <section class="question-card" id="questionCard">
          <div class="badges" id="badges"></div>
          <h1 id="questionText">...</h1>
          <div class="options" id="options"></div>
          <div class="explain" id="explain"></div>
          <div class="footer-actions">
            <button class="secondary" id="prevBtn" type="button">Назад</button>
            <button class="primary" id="nextBtn" type="button">Дальше</button>
          </div>
        </section>

        <section class="result" id="resultPanel">
          <h2 id="resultTitle">Результат</h2>
          <p id="resultText"></p>
          <div class="review-list" id="reviewList"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const QUESTION_BANK = [
      {
        id: "goal-01",
        category: "Идея проекта",
        difficulty: "base",
        q: "Что Aurora Atelier показывает как главную ценность дипломного проекта?",
        options: [
          "Одностраничный лендинг без backend",
          "Полный e-commerce workflow с каталогом, конструктором, корзиной, оплатой и админкой",
          "Только редактор изображений украшений",
          "CRM без публичного сайта"
        ],
        a: 1,
        why: "В проекте важно показать не витрину отдельно, а связанный путь клиента и администратора."
      },
      {
        id: "goal-02",
        category: "Идея проекта",
        difficulty: "base",
        q: "Какая фраза лучше всего описывает MVP проекта?",
        options: [
          "Сайт-визитка бренда",
          "Магазин авторских украшений с индивидуальной сборкой и обработкой заказов",
          "Статичный каталог PDF-изображений",
          "Внутренняя бухгалтерская система"
        ],
        a: 1,
        why: "MVP соединяет каталог, custom design, checkout, mock payment и admin order workflow."
      },
      {
        id: "goal-03",
        category: "Идея проекта",
        difficulty: "exam",
        q: "Почему на защите нельзя говорить, что это только frontend-проект?",
        options: [
          "Потому что в проекте есть серверная валидация цены, сессии, база, checkout, orders и admin API",
          "Потому что используется CSS",
          "Потому что есть картинки украшений",
          "Потому что сайт открывается в браузере"
        ],
        a: 0,
        why: "Backend в проекте отвечает за бизнес-правила, данные, заказы, авторизацию и админские сценарии."
      },
      {
        id: "goal-04",
        category: "Идея проекта",
        difficulty: "base",
        q: "Какие две основные роли есть в системе?",
        options: [
          "Client и Admin",
          "Designer и Accountant",
          "Courier и Supplier",
          "Moderator и Guest"
        ],
        a: 0,
        why: "Покупатель проходит публичный сценарий, администратор обрабатывает заказы и управляет каталогом/конструктором."
      },
      {
        id: "goal-05",
        category: "Идея проекта",
        difficulty: "hard",
        q: "Что является практической пользой проекта для бренда украшений?",
        options: [
          "Пользователь заранее видит конфигурацию, цену и состав заказа, а мастер получает управляемый order workflow",
          "Сайт автоматически печатает накладные",
          "Сайт заменяет юридическую регистрацию бизнеса",
          "Проект нужен только для генерации картинок"
        ],
        a: 0,
        why: "Главный сценарий - прозрачная кастомизация для клиента и понятная обработка для администратора."
      },
      {
        id: "stack-01",
        category: "Стек и запуск",
        difficulty: "base",
        q: "Какой основной способ запуска проекта принят для дипломной демонстрации?",
        options: [
          "Открыть все JSX-файлы напрямую в браузере",
          "docker compose up --build -d app",
          "Запустить только Vite без backend",
          "Скопировать public/react-app на флешку без сервера"
        ],
        a: 1,
        why: "Docker-first запуск показывает воспроизводимость приложения, миграций и базы."
      },
      {
        id: "stack-02",
        category: "Стек и запуск",
        difficulty: "base",
        q: "Где в Docker runtime находится актуальная SQLite-база?",
        options: [
          "/app/data/aurora.sqlite3",
          "/tmp/aurora.json",
          "client/src/data.sqlite3",
          "public/react-app/db.sqlite"
        ],
        a: 0,
        why: "Проект закрепил DB_FILENAME=/app/data/aurora.sqlite3 внутри Docker volume."
      },
      {
        id: "stack-03",
        category: "Стек и запуск",
        difficulty: "base",
        q: "Какая команда запускает полный набор тестов?",
        options: [
          "npm test",
          "npm audit",
          "npm run preview",
          "docker compose logs"
        ],
        a: 0,
        why: "Тесты идут через Vitest, команда проекта - npm test."
      },

    };

      reviewList: document.getElementById("reviewList")
    };

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function currentFilters() {
      return {
        category: elements.categorySelect.value,
        difficulty: elements.difficultySelect.value
      };
    }

    function filteredQuestions() {
      const filters = currentFilters();
      return QUESTION_BANK.filter((item) => {
        if (state.mode === "missed" && !state.missed.has(item.id)) return false;
        if (filters.category !== "all" && item.category !== filters.category) return false;
        if (filters.difficulty !== "all" && item.difficulty !== filters.difficulty) return false;
        return true;
      });
    }

    function updateBestScore() {
      const accuracy = state.answered ? Math.round((state.score / state.answered) * 100) : 0;
      const best = Number(localStorage.getItem("auroraQuizBest") || "0");
      if (accuracy > best && state.answered >= 10) {
        localStorage.setItem("auroraQuizBest", String(accuracy));
      }
    }

    function syncStats() {
      const total = state.order.length;
      const accuracy = state.answered ? Math.round((state.score / state.answered) * 100) : 0;
      elements.scoreText.textContent = `${state.score}/${state.answered}`;
      elements.accuracyText.textContent = `${accuracy}%`;
      elements.streakText.textContent = String(state.streak);
      elements.bestText.textContent = `${localStorage.getItem("auroraQuizBest") || "0"}%`;
      elements.progressText.textContent = total ? `Вопрос ${state.index + 1} из ${total}` : "Нет вопросов";
      elements.progressFill.style.width = total ? `${((state.index + 1) / total) * 100}%` : "0%";
      elements.prevBtn.disabled = state.index === 0;
      elements.nextBtn.textContent = state.index >= total - 1 ? "Финиш" : "Дальше";
    }

    function persistMisses() {
      localStorage.setItem("auroraQuizMissed", JSON.stringify([...state.missed]));
    }

    function renderCategoryMap() {
      const grouped = QUESTION_BANK.reduce((acc, item) => {
        acc[item.category] = (acc[item.category] || 0) + 1;
        return acc;
      }, {});
      elements.categoryMap.innerHTML = Object.entries(grouped)
        .map(([name, count]) => `<div class="map-row"><strong>${name}</strong><span>${count}</span></div>`)
        .join("");
    }

    function renderFilters() {
      const categories = [...new Set(QUESTION_BANK.map((item) => item.category))].sort((a, b) => a.localeCompare(b, "ru"));
      elements.categorySelect.innerHTML = `<option value="all">Все разделы</option>${categories.map((category) => `<option value="${category}">${category}</option>`).join("")}`;
    }

    function currentQuestion() {
      return state.order[state.index] || null;
    }

    function renderEmpty() {
      elements.badges.innerHTML = "";
      elements.questionText.textContent = "Вопросы не найдены";
      elements.options.innerHTML = `<div class="empty">В этом фильтре пока нет вопросов или список ошибок пуст.</div>`;
      elements.explain.classList.remove("visible");
      elements.resultPanel.classList.remove("visible");
      syncStats();
    }

    function renderQuestion() {
      const question = currentQuestion();
      if (!question) {
        renderEmpty();
        return;
      }

      const selected = state.selectedById[question.id];
      const isAnswered = selected != null;
      elements.resultPanel.classList.remove("visible");
      elements.badges.innerHTML = `
        <span class="badge">${question.category}</span>
        <span class="badge">${question.difficulty === "base" ? "База" : question.difficulty === "hard" ? "Сложный" : "Комиссия"}</span>
      `;
      elements.questionText.textContent = question.q;
      elements.options.innerHTML = question.options.map((option, index) => {
        let statusClass = "";
        if (isAnswered && index === question.a) statusClass = " correct";
        if (isAnswered && index === selected && selected !== question.a) statusClass = " wrong";
        return `
          <button class="option${statusClass}" type="button" data-option="${index}">
            <span class="option-index">${index + 1}</span>
            <span>${option}</span>
          </button>
        `;
      }).join("");
      elements.explain.textContent = isAnswered ? question.why : "";
      elements.explain.classList.toggle("visible", isAnswered);
      syncStats();
    }

    function answerQuestion(optionIndex) {
      const question = currentQuestion();
      if (!question || state.selectedById[question.id] != null) return;

      state.selectedById[question.id] = optionIndex;
      state.answered += 1;

      if (optionIndex === question.a) {
        state.score += 1;
        state.streak += 1;
        state.missed.delete(question.id);
      } else {
        state.streak = 0;
        state.missed.add(question.id);
      }

      persistMisses();
      updateBestScore();
      renderQuestion();
    }

    function showResult() {
      const accuracy = state.answered ? Math.round((state.score / state.answered) * 100) : 0;
      elements.resultPanel.classList.add("visible");
      elements.resultTitle.textContent = accuracy >= 85 ? "Можно идти к комиссии" : accuracy >= 65 ? "Уже неплохо, но есть дырки" : "Нужно ещё прогнать материал";
      elements.resultText.textContent = `Итог: ${state.score} правильных из ${state.answered}. Точность ${accuracy}%. Ошибок в банке повторения: ${state.missed.size}.`;
      const missedQuestions = QUESTION_BANK.filter((item) => state.missed.has(item.id)).slice(0, 8);
      elements.reviewList.innerHTML = missedQuestions.length
        ? missedQuestions.map((item) => `<div class="review-item"><strong>${item.q}</strong><span>${item.why}</span></div>`).join("")
        : `<div class="review-item"><strong>Ошибок нет</strong><span>Чистый проход. Теперь попробуй фильтр "Комиссия".</span></div>`;
      syncStats();
    }

    function nextQuestion() {
      if (state.index >= state.order.length - 1) {
        showResult();
        return;
      }
      state.index += 1;
      renderQuestion();
    }

    function previousQuestion() {
      if (state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    }

    function resetSession(keepOrder = false) {
      const questions = filteredQuestions();
      state.order = keepOrder ? questions : shuffle(questions);
      state.index = 0;
      state.score = 0;
      state.answered = 0;
      state.streak = 0;
      state.selectedById = {};
      elements.resultPanel.classList.remove("visible");
      renderQuestion();
    }

    function setMode(mode) {
      state.mode = mode;
      elements.allModeBtn.classList.toggle("active", mode === "all");
      elements.missedModeBtn.classList.toggle("active", mode === "missed");
      resetSession();
    }

    elements.options.addEventListener("click", (event) => {
      const button = event.target.closest("[data-option]");
      if (!button) return;
      answerQuestion(Number(button.dataset.option));
    });

    elements.nextBtn.addEventListener("click", nextQuestion);
    elements.prevBtn.addEventListener("click", previousQuestion);
    elements.resetBtn.addEventListener("click", () => resetSession());
    elements.shuffleBtn.addEventListener("click", () => resetSession());
    elements.allModeBtn.addEventListener("click", () => setMode("all"));
    elements.missedModeBtn.addEventListener("click", () => setMode("missed"));
    elements.categorySelect.addEventListener("change", () => resetSession());
    elements.difficultySelect.addEventListener("change", () => resetSession());

    window.addEventListener("keydown", (event) => {
      if (event.key >= "1" && event.key <= "4") answerQuestion(Number(event.key) - 1);
      if (event.key === "ArrowRight") nextQuestion();
      if (event.key === "ArrowLeft") previousQuestion();
    });

    renderFilters();
    renderCategoryMap();
    resetSession();
  </script>
</body>
</html>
