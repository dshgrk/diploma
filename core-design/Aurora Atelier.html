<style>
/* ── Tokens ─────────────────────────────────────────────────────────────── */
:root {
  --bg: #f4f1ea;
  --bg-soft: #fbfaf6;
  --bg-deep: #101513;
  --bg-ink: #070a09;
  --surface: rgba(255,255,250,0.92);
  --surface-strong: #fffefa;
  --surface-dark: rgba(12,17,15,0.96);
  --ink: #202622;
  --ink-strong: #0a0f0d;
  --ink-muted: #5f6b66;
  --ink-soft: #87938e;
  --gold: #b8914f;
  --gold-soft: #e7d4aa;
  --sage: #3f675e;
  --clay: #9f5258;
  --clay-strong: #743139;
  --rose: #cf9aa1;
  --success: #247257;
  --warning: #a96a20;
  --danger: #a43b35;
  --line: rgba(180,160,120,0.18);
  --line-strong: rgba(180,160,120,0.38);
  --shadow-sm: 0 1px 4px rgba(10,15,10,0.07);
  --shadow: 0 4px 18px rgba(10,15,10,0.10);
  --shadow-dark: 0 8px 32px rgba(10,15,10,0.28);
  --radius: 8px;
  --container: 1220px;
  --accent: var(--sage);
}
[data-accent="gold"] { --accent: var(--gold); }
[data-accent="clay"] { --accent: var(--clay); }
[data-accent="sage"] { --accent: var(--sage); }

/* ── Reset / Base ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.62;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated premium background ───────────────────────────────────────── */
#aurora-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  background: #e8e3d8;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(70px);
  animation: orbFloat linear infinite;
  will-change: transform;
}
.orb-1 { width: 900px; height: 900px; background: radial-gradient(circle, rgba(184,145,79,0.72) 0%, rgba(184,145,79,0.3) 40%, transparent 65%); top: -250px; left: -200px; animation-duration: 30s; animation-delay: 0s; }
.orb-2 { width: 650px; height: 650px; background: radial-gradient(circle, rgba(63,103,94,0.55) 0%, rgba(63,103,94,0.2) 40%, transparent 65%); top: 35%; right: -180px; animation-duration: 24s; animation-delay: -9s; }
.orb-3 { width: 750px; height: 750px; background: radial-gradient(circle, rgba(231,212,170,0.78) 0%, rgba(231,212,170,0.35) 40%, transparent 65%); bottom: -150px; left: 25%; animation-duration: 38s; animation-delay: -16s; }
.orb-4 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(159,82,88,0.42) 0%, rgba(159,82,88,0.15) 40%, transparent 65%); top: 55%; left: -120px; animation-duration: 27s; animation-delay: -6s; }
.orb-5 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(196,168,130,0.65) 0%, rgba(196,168,130,0.25) 40%, transparent 65%); top: 12%; right: 20%; animation-duration: 21s; animation-delay: -12s; }
.orb-6 { width: 550px; height: 550px; background: radial-gradient(circle, rgba(63,103,94,0.38) 0%, rgba(63,103,94,0.12) 40%, transparent 65%); bottom: 20%; right: 10%; animation-duration: 32s; animation-delay: -20s; }

@keyframes orbFloat {
  0%   { transform: translate(0px, 0px) scale(1); }
  20%  { transform: translate(80px, -55px) scale(1.07); }
  45%  { transform: translate(-40px, 90px) scale(0.93); }
  70%  { transform: translate(-90px, -30px) scale(1.04); }
  100% { transform: translate(0px, 0px) scale(1); }
}

/* Moving grain texture */
#aurora-bg::before {
  content: '';
  position: absolute; inset: -50%;
  width: 200%; height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  animation: grainDrift 8s steps(1) infinite;
}
@keyframes grainDrift {
  0%{transform:translate(0,0)} 10%{transform:translate(-2%,-3%)} 20%{transform:translate(3%,1%)} 30%{transform:translate(-1%,4%)} 40%{transform:translate(4%,-2%)} 50%{transform:translate(-3%,2%)} 60%{transform:translate(2%,-4%)} 70%{transform:translate(-4%,1%)} 80%{transform:translate(1%,3%)} 90%{transform:translate(-2%,-1%)} 100%{transform:translate(0,0)}
}

/* Subtle grid */
#aurora-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(180,160,120,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,120,0.08) 1px, transparent 1px);
  background-size: 72px 72px;
  animation: gridDrift 50s linear infinite;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to   { background-position: 72px 72px; }
}

/* All content above the bg */
#root > div > *:not(#aurora-bg) { position: relative; z-index: 1; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px; }

/* ── Typography ─────────────────────────────────────────────────────────── */
h1, h2, h3, h4 { font-family: 'Fraunces', serif; font-weight: 400; color: var(--ink-strong); line-height: 1.08; }
.eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
.eyebrow-light { color: var(--gold-soft); }
.section-title { font-size: clamp(2rem, 4vw, 3rem); margin-top: 0.75rem; }
.section-sub { color: var(--ink-muted); max-width: 520px; margin-top: 1rem; font-size: 15px; line-height: 1.7; }
.page-title { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 2rem; }

/* ── Layout ─────────────────────────────────────────────────────────────── */
.section-inner { max-width: var(--container); margin: 0 auto; padding: 0 2rem; }
.section { padding: clamp(3rem,6vw,5.5rem) 0; }
.section-heading { margin-bottom: 3rem; }
.section-heading-center { text-align: center; }
.section-heading-center .section-sub { margin-left: auto; margin-right: auto; }

/* ── Nav ────────────────────────────────────────────────────────────────── */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(244,241,234,0.55);
  backdrop-filter: blur(28px) saturate(200%) brightness(1.04);
  -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.04);
  border-bottom: 1px solid rgba(255,255,255,0.55);
  box-shadow: 0 1px 0 rgba(180,160,120,0.12), 0 4px 24px rgba(10,14,12,0.06);
  transition: background 0.3s, box-shadow 0.3s;
}
.site-nav.scrolled {
  background: rgba(251,250,246,0.82);
  box-shadow: 0 1px 0 rgba(180,160,120,0.15), 0 6px 32px rgba(10,14,12,0.10);
}
.nav-inner { max-width: var(--container); margin: 0 auto; padding: 0 2rem; height: 64px; display: flex; align-items: center; gap: 2rem; }
.nav-brand { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 500; color: var(--ink-strong); letter-spacing: 0.01em; white-space: nowrap; }
.nav-links-desktop { display: flex; gap: 0.25rem; flex: 1; }
.nav-link { padding: 0.4rem 0.85rem; font-size: 13.5px; font-weight: 500; color: var(--ink-muted); border-radius: 20px; transition: background 0.18s, color 0.18s; }
.nav-link:hover, .nav-link.active { color: var(--ink); background: var(--line); }
.nav-actions { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
.lang-toggle { font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-muted); padding: 0.3rem 0.6rem; border-radius: 4px; border: 1px solid var(--line); transition: all 0.15s; }
.lang-toggle:hover { color: var(--ink); border-color: var(--line-strong); }
.icon-button { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--ink); transition: background 0.15s; position: relative; }
.icon-button:hover { background: var(--line); }
.cart-badge { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.nav-mobile-toggle { display: none; }
.nav-mobile-menu { display: none; background: var(--surface-strong); border-top: 1px solid var(--line); padding: 1rem 2rem; }
.nav-mobile-link { display: block; width: 100%; text-align: left; padding: 0.7rem 0; font-size: 15px; font-weight: 500; color: var(--ink); border-bottom: 1px solid var(--line); }
.nav-mobile-link:last-child { border-bottom: none; }
@media (max-width: 720px) {
  .nav-links-desktop { display: none; }
  .nav-mobile-toggle { display: flex; }
  .nav-mobile-menu { display: block; }
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.button {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.75rem 1.75rem; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent) 0%, color-mix(in oklch, var(--accent) 80%, #0a0f0d) 100%);
  color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
  border: 1px solid transparent; transition: all 0.2s; white-space: nowrap;
  box-shadow: 0 2px 10px color-mix(in oklch, var(--accent) 30%, transparent);
}
.button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px color-mix(in oklch, var(--accent) 40%, transparent); }
.button:active { transform: none; }
.button.added { background: var(--success); }
.button-ghost { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border-radius: var(--radius); background: transparent; color: var(--ink); font-size: 14px; font-weight: 600; border: 1.5px solid var(--line-strong); transition: all 0.2s; white-space: nowrap; }
.button-ghost:hover { background: var(--line); border-color: var(--ink-soft); }
.button-ghost-light { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border-radius: var(--radius); background: rgba(255,255,255,0.12); color: #fff; font-size: 14px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.3); backdrop-filter: blur(4px); transition: all 0.2s; white-space: nowrap; }
.button-ghost-light:hover { background: rgba(255,255,255,0.22); }
.button-light { background: #fff; color: var(--ink-strong); border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
.button-light:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
.btn-sm { padding: 0.5rem 1.1rem; font-size: 13px; }

/* ── Hero ───────────────────────────────────────────────────────────────── */
.aurora-hero { position: relative; height: 100vh; min-height: 600px; overflow: hidden; }
.hero-slide { position: absolute; inset: 0; transition: opacity 0.5s; }
.hero-slide.fade-in { opacity: 1; }
.hero-slide.fade-out { opacity: 0; }
.hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 8s ease; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(10,14,12,0.62) 0%, rgba(10,14,12,0.3) 60%, rgba(10,14,12,0.55) 100%); }
.hero-content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 0 clamp(1.5rem,6vw,8rem); padding-top: 64px; max-width: 860px; }
.hero-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-soft); margin-bottom: 1.25rem; }
.hero-title { font-family: 'Fraunces', serif; font-size: clamp(3rem,7vw,6.5rem); font-weight: 300; color: #fff; line-height: 1.02; margin-bottom: 2rem; }
.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
.hero-controls { position: absolute; bottom: 2.5rem; left: clamp(1.5rem,6vw,8rem); display: flex; gap: 0.6rem; }
.hero-dot { width: 28px; height: 3px; background: rgba(255,255,255,0.35); border-radius: 2px; transition: all 0.3s; }
.hero-dot.active { width: 48px; background: #fff; }
.hero-scroll-hint { position: absolute; bottom: 2.5rem; right: 3rem; display: flex; align-items: center; }
.scroll-line { width: 1px; height: 48px; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.5)); animation: scrollAnim 2s ease-in-out infinite; }
@keyframes scrollAnim { 0%,100%{opacity:0.3;transform:scaleY(0.6)} 50%{opacity:1;transform:scaleY(1)} }

/* ── Trust Strip ────────────────────────────────────────────────────────── */
.trust-strip { display: flex; justify-content: center; gap: 0; background: rgba(251,250,246,0.65); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); border-top: 1px solid rgba(255,255,255,0.55); border-bottom: 1px solid rgba(180,160,120,0.15); }
.trust-item { flex: 1; max-width: 220px; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; padding: 1.75rem 1rem; text-align: center; border-right: 1px solid var(--line); }
.trust-item:last-child { border-right: none; }
.trust-icon { color: var(--accent); }
.trust-label { font-size: 12.5px; font-weight: 600; color: var(--ink); text-transform: uppercase; letter-spacing: 0.05em; white-space: pre-line; }

/* ── Featured grid ──────────────────────────────────────────────────────── */
.featured-section { background: transparent; }
.featured-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; }
.featured-card { cursor: pointer; }
.featured-card-img { aspect-ratio: 3/4; border-radius: calc(var(--radius) + 4px); overflow: hidden; position: relative; background: var(--line); box-shadow: 0 2px 16px rgba(10,14,12,0.10), 0 1px 0 rgba(255,255,255,0.6) inset; }
.featured-card-img img { transition: transform 0.5s ease; }
.featured-card:hover .featured-card-img img { transform: scale(1.04); }
.featured-card-overlay { position: absolute; inset: 0; background: rgba(10,14,12,0.38); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 1.5rem; opacity: 0; transition: opacity 0.25s; }
.featured-card:hover .featured-card-overlay { opacity: 1; }
.featured-card-info { padding: 1rem 0.25rem 0.25rem; }
.featured-card-name { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 400; color: var(--ink-strong); }
.featured-card-meta { font-size: 12px; color: var(--ink-soft); margin-top: 0.2rem; }
.featured-card-price { font-size: 14px; font-weight: 700; color: var(--accent); margin-top: 0.4rem; }

/* ── Bespoke ────────────────────────────────────────────────────────────── */
.bespoke-section { position: relative; min-height: 520px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.bespoke-bg { position: absolute; inset: 0; }
.bespoke-bg img { object-fit: cover; filter: brightness(0.5) saturate(0.7); }
.bespoke-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(10,14,12,0.75) 0%, rgba(10,14,12,0.4) 100%); }
.bespoke-content { position: relative; z-index: 2; text-align: center; padding: 4rem 2rem; max-width: 640px; }
.bespoke-title { font-family: 'Fraunces', serif; font-size: clamp(2.2rem,5vw,4rem); color: #fff; font-weight: 300; margin: 1rem 0; white-space: pre-line; }
.bespoke-sub { color: rgba(255,255,255,0.75); font-size: 15px; line-height: 1.7; margin-bottom: 2rem; }

/* ── Editorial ──────────────────────────────────────────────────────────── */
.editorial-section { background: transparent; }
.editorial-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; }
.editorial-card { border-radius: calc(var(--radius) + 4px); overflow: hidden; background: rgba(255,255,250,0.72); backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%); border: 1px solid rgba(255,255,255,0.65); box-shadow: 0 4px 24px rgba(10,14,12,0.08), 0 1px 0 rgba(255,255,255,0.8) inset; transition: transform 0.3s, box-shadow 0.3s; }
.editorial-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(10,14,12,0.13), 0 1px 0 rgba(255,255,255,0.9) inset; }
.editorial-card-img { aspect-ratio: 4/3; overflow: hidden; }
.editorial-card-img img { transition: transform 0.5s; }
.editorial-card:hover .editorial-card-img img { transform: scale(1.04); }
.editorial-card-body { padding: 1.5rem; }
.editorial-card-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 0.6rem; }
.editorial-card-text { font-size: 13.5px; color: var(--ink-muted); line-height: 1.7; }

/* ── FAQ ────────────────────────────────────────────────────────────────── */
.faq-section { background: transparent; }
.faq-list { max-width: 700px; }
.faq-item { border-bottom: 1px solid rgba(180,160,120,0.2); background: transparent; }
.faq-item.open { background: rgba(255,255,250,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: var(--radius); padding: 0 1rem; }
.faq-question { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 0; font-size: 15px; font-weight: 600; color: var(--ink); text-align: left; gap: 1rem; }
.faq-arrow { font-size: 1.4rem; color: var(--accent); flex-shrink: 0; transition: transform 0.2s; }
.faq-item.open .faq-arrow { transform: rotate(180deg); }
.faq-answer { padding-bottom: 1.25rem; font-size: 14px; color: var(--ink-muted); line-height: 1.72; }

/* ── Final CTA ──────────────────────────────────────────────────────────── */
.final-cta-section { background: var(--bg-deep); padding: clamp(4rem,8vw,7rem) 0; }
.final-cta-inner { max-width: var(--container); margin: 0 auto; padding: 0 2rem; text-align: center; }
.final-cta-title { font-family: 'Fraunces', serif; font-size: clamp(2rem,4vw,3.5rem); font-weight: 300; color: #fff; }
.final-cta-sub { color: rgba(255,255,255,0.6); font-size: 15px; margin-top: 1rem; margin-bottom: 2.5rem; }
.final-cta-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

/* ── Footer ─────────────────────────────────────────────────────────────── */
.site-footer { background: var(--bg-ink); color: rgba(255,255,255,0.55); padding: 3.5rem 0 0; }
.footer-inner { max-width: var(--container); margin: 0 auto; padding: 0 2rem 3rem; display: grid; grid-template-columns: 1.4fr 2fr; gap: 4rem; }
.footer-brand { font-family: 'Fraunces', serif; font-size: 1.2rem; color: #fff; margin-bottom: 0.75rem; }
.footer-tagline { font-size: 13px; line-height: 1.6; max-width: 240px; }
.footer-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; }
.footer-col-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 1rem; }
.footer-link { display: block; font-size: 13.5px; color: rgba(255,255,255,0.55); padding: 0.3rem 0; transition: color 0.15s; text-align: left; }
.footer-link:hover { color: rgba(255,255,255,0.9); }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.07); padding: 1.25rem 2rem; max-width: var(--container); margin: 0 auto; display: flex; justify-content: space-between; font-size: 12px; }
.footer-copy { color: rgba(255,255,255,0.3); }

/* ── Pages ──────────────────────────────────────────────────────────────── */
.page-main { min-height: 80vh; padding-top: 80px; background: transparent; }
.page-header { padding: 3rem 0 2rem; background: rgba(255,255,250,0.55); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); border-bottom: 1px solid rgba(255,255,255,0.5); margin-bottom: 2.5rem; }
.home-main { padding-top: 0; }

/* ── Catalog ────────────────────────────────────────────────────────────── */
.catalog-trust-strip { background: rgba(12,17,15,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 1rem 0; }
.catalog-trust-items { display: flex; gap: 2.5rem; align-items: center; }
.catalog-trust-item { display: flex; align-items: center; gap: 0.6rem; font-size: 12.5px; color: rgba(255,255,255,0.65); font-weight: 500; }
.catalog-trust-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }
.filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
.filter-pill { padding: 0.45rem 1.1rem; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--ink-muted); border: 1.5px solid var(--line); transition: all 0.18s; }
.filter-pill:hover { color: var(--ink); border-color: var(--line-strong); }
.filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Product Detail ─────────────────────────────────────────────────────── */

/* ── Constructor ────────────────────────────────────────────────────────── */

/* ── Stone Slots ─────────────────────────────────────────────────────────── */

/* ── Cart ───────────────────────────────────────────────────────────────── */

/* ── Orders ─────────────────────────────────────────────────────────────── */
.orders-list { display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem; }
.order-card { background: rgba(255,255,250,0.75); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); border: 1px solid rgba(255,255,255,0.6); border-radius: calc(var(--radius) + 4px); padding: 1.5rem; box-shadow: 0 4px 24px rgba(10,14,12,0.08), 0 1px 0 rgba(255,255,255,0.8) inset; transition: transform 0.25s, box-shadow 0.25s; }

.order-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.order-id { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 400; color: var(--ink-strong); }

.status-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--status-color, var(--ink-muted)); text-transform: uppercase; }

.order-items { font-size: 13.5px; color: var(--ink-muted); margin-bottom: 1rem; }

/* ── Pills ───────────────────────────────────────────────────────────────── */
.pill { display: inline-flex; align-items: center; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; background: color-mix(in oklch, var(--accent) 12%, transparent); color: var(--accent); }
.pill-success { background: color-mix(in oklch, var(--success) 12%, transparent); color: var(--success); }

/* ── Admin ──────────────────────────────────────────────────────────────── */
.admin-main { background: var(--bg); }
.admin-header { background: var(--bg-deep); padding: 1.5rem 0; }
.admin-inner { max-width: 1320px; margin: 0 auto; padding: 0 2rem; }
.admin-title { font-family: 'Fraunces', serif; font-size: 1.8rem; color: #fff; font-weight: 300; display: inline; margin-right: 1.5rem; }
.admin-header .admin-inner { display: flex; align-items: center; justify-content: space-between; }
.admin-metric-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; margin-bottom: 2.5rem; }
.admin-metric-card { background: rgba(255,255,250,0.75); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); border: 1px solid rgba(255,255,255,0.65); border-radius: calc(var(--radius)+4px); padding: 1.5rem; box-shadow: 0 4px 24px rgba(10,14,12,0.08), 0 1px 0 rgba(255,255,255,0.8) inset; }
.admin-metric-val { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 400; color: var(--ink-strong); }
.admin-metric-label { font-size: 12px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.35rem; }
.admin-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 2rem; }
.admin-tab { padding: 0.75rem 1.5rem; font-size: 14px; font-weight: 600; color: var(--ink-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.admin-table-wrap { overflow-x: auto; }
.admin-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.admin-table th { text-align: left; padding: 0.75rem 1rem; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); border-bottom: 1px solid var(--line); }
.admin-table td { padding: 1rem; border-bottom: 1px solid var(--line); color: var(--ink); }
.admin-table tr:hover td { background: var(--bg-soft); }
.admin-order-id { font-family: 'Fraunces', serif; font-weight: 400; }
.admin-products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 1.25rem; padding-bottom: 3rem; }
.admin-product-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
.admin-product-card img { height: 160px; object-fit: cover; }
.admin-product-info { padding: 0.85rem; flex: 1; }
.admin-product-name { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 400; }
.admin-product-meta { font-size: 11.5px; color: var(--ink-soft); margin-top: 0.2rem; }
.admin-product-price { font-size: 14px; font-weight: 700; color: var(--accent); margin-top: 0.4rem; }
.admin-product-card .pill { margin: 0 0.85rem 0.85rem; align-self: flex-start; }

/* ── Toast ──────────────────────────────────────────────────────────────── */
.toast-root { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast { background: var(--bg-ink); color: #fff; padding: 0.85rem 1.25rem; border-radius: var(--radius); font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow-dark); border: 1px solid rgba(255,255,255,0.08); animation: toastIn 0.25s ease; }
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 1080px) {
  .featured-grid { grid-template-columns: repeat(2,1fr); }
  .footer-inner { grid-template-columns: 1fr; gap: 2rem; }
}
@media (max-width: 980px) {
  .product-layout, .constructor-layout, .cart-layout, .checkout-layout { grid-template-columns: 1fr; }
  .constructor-preview-sticky { position: static; }
  .editorial-grid { grid-template-columns: repeat(2,1fr); }
  .auth-experience { grid-template-columns: 1fr; }
  .auth-aside { display: none; }
  .admin-metric-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 760px) {
  .trust-strip { flex-wrap: wrap; }
  .trust-item { flex: 1 0 45%; border-right: none; border-bottom: 1px solid var(--line); }
  .type-grid { grid-template-columns: repeat(2,1fr); }
  .final-cta-actions { flex-direction: column; align-items: center; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid [style*="gridColumn"] { grid-column: 1; }
}
@media (max-width: 620px) {
  .featured-grid { grid-template-columns: 1fr; }
  .editorial-grid { grid-template-columns: 1fr; }
  .catalog-trust-items { flex-direction: column; gap: 0.75rem; }
  .hero-title { font-size: clamp(2.2rem, 10vw, 4rem); }
  .admin-metric-grid { grid-template-columns: 1fr; }
  .cart-item { grid-template-columns: 72px 1fr; }
  .cart-item-actions { grid-column: 1/-1; flex-direction: row; justify-content: flex-start; }
  .stone-grid { grid-template-columns: repeat(2,1fr); }
  .footer-cols { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="aurora-nav.jsx"></script>
<script type="text/babel" src="aurora-home.jsx"></script>
<script type="text/babel" src="aurora-catalog.jsx"></script>
<script type="text/babel" src="aurora-constructor.jsx"></script>
<script type="text/babel" src="aurora-flows.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "gold"
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = React.useState('home');
  const [lang, setLang] = React.useState('uk');
  const [cart, setCart] = React.useState([]);
  const [isLoggedIn, setIsLoggedIn] = React.useState(false);
  const [toasts, setToasts] = React.useState([]);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = window.useT(lang);

  function addToCart(item) {
    setCart(c => {
      const existing = c.findIndex(x => x.id === item.id && !item.isCustom);
      if (existing >= 0) {
        return c.map((x, i) => i === existing ? { ...x, qty: (x.qty || 1) + 1 } : x);
      }
      return [...c, { ...item, qty: item.qty || 1 }];
    });
    const msg = t('toast_added');
    const id = Date.now();
    setToasts(ts => [...ts, { id, msg }]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 2600);
  }

  const accent = tweaks.accentColor || 'sage';
  const accentHex = { sage: '#3f675e', gold: '#b8914f', clay: '#9f5258' }[accent] || '#3f675e';

  return (
    <div data-accent={accent} style={{ '--accent': accentHex }}>
      <div id="aurora-bg">
        <div className="orb orb-1" />
        <div className="orb orb-2" />
        <div className="orb orb-3" />
        <div className="orb orb-4" />
        <div className="orb orb-5" />
      </div>
      <AuroraNav
        page={page} setPage={setPage}
        lang={lang} setLang={setLang}
        cartCount={cart.reduce((s,i) => s + (i.qty||1), 0)}
        isLoggedIn={isLoggedIn}
        setIsLoggedIn={setIsLoggedIn}
        accentColor={accent}
      />

      {page === 'home' && <HomePage lang={lang} setPage={setPage} addToCart={addToCart} accentColor={accent} />}
      {page === 'catalog' && <CatalogPage lang={lang} setPage={setPage} addToCart={addToCart} />}
      {page === 'product' && <ProductPage lang={lang} setPage={setPage} addToCart={addToCart} />}
      {page === 'constructor' && <ConstructorPage lang={lang} setPage={setPage} addToCart={addToCart} />}
      {page === 'cart' && <CartPage lang={lang} cart={cart} setCart={setCart} setPage={setPage} />}
      {page === 'checkout' && <CheckoutPage lang={lang} cart={cart} setCart={setCart} setPage={setPage} setIsLoggedIn={setIsLoggedIn} />}
      {page === 'auth' && <AuthPage lang={lang} setPage={setPage} setIsLoggedIn={setIsLoggedIn} />}
      {page === 'orders' && <OrdersPage lang={lang} setPage={setPage} />}
      {page === 'admin' && <AdminPage lang={lang} setPage={setPage} />}

      {page !== 'home' && <AuroraFooter lang={lang} setPage={setPage} />}

      <AuroraToast toasts={toasts} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Акцентний колір / Accent">
          <TweakRadio label="" value={tweaks.accentColor} options={['sage','gold','clay']}
            onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
        <TweakSection title="Мова / Language">
          <TweakRadio label="" value={lang} options={['uk','en']}
            onChange={v => setLang(v)} />
        </TweakSection>
        <TweakSection title="Demo">
          <TweakButton label={lang === 'uk' ? 'Увійти як клієнт' : 'Login as Client'} onClick={() => setIsLoggedIn(true)} />
          <TweakButton label={lang === 'uk' ? 'Відкрити адмін' : 'Open Admin'} onClick={() => { setPage('admin'); window.scrollTo(0,0); }} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
