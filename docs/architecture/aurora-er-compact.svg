    .entity-title { font: 700 16px Arial, sans-serif; fill: #111; }
    .field { font: 15px Arial, sans-serif; fill: #111; }
    .rel { stroke: #111; stroke-width: 2.2; fill: none; }
    .label { font: 15px Arial, sans-serif; fill: #111; }
