      - heading "Публічна оферта" [level=1] [ref=e150]
      - paragraph [ref=e28]: Ця Публічна оферта визначає умови оформлення, оплати, виготовлення, доставки та отримання замовлень на сайті Aurora Atelier.
    - generic [ref=e30]:
      - complementary [ref=e31]:
        - generic [ref=e32]: Актуальна редакція
        - heading "31 травня 2026 року" [level=2] [ref=e151]
        - paragraph [ref=e34]: Оформлюючи замовлення на сайті, клієнт підтверджує, що ознайомився з умовами цієї Публічної оферти та приймає їх у повному обсязі.
      - generic [ref=e35]:
        - generic [ref=e152]:
          - heading "1. Загальні положення" [level=2] [ref=e153]
          - paragraph [ref=e154]: 1.1. Aurora Atelier — це онлайн-вітрина ювелірної майстерні, де клієнт може обрати готову прикрасу з каталогу або створити індивідуально налаштовану прикрасу за допомогою конструктора.
          - paragraph [ref=e155]: 1.2. Ця Публічна оферта є пропозицією укласти електронний договір купівлі-продажу товару або замовлення персоналізованого виробу.
          - paragraph [ref=e156]: 1.3. Акцептом цієї оферти є оформлення замовлення на сайті та підтвердження згоди з умовами оферти під час оформлення замовлення.
          - paragraph [ref=e157]: 1.4. Умови цієї оферти застосовуються до всіх замовлень, оформлених через сайт Aurora Atelier.
        - generic [ref=e158]:
          - heading "2. Терміни" [level=2] [ref=e159]
          - paragraph [ref=e160]: 2.1. Сайт — вебсистема Aurora Atelier, призначена для перегляду каталогу, створення персоналізованих прикрас, додавання товарів до кошика та оформлення замовлень.
          - paragraph [ref=e161]: 2.2. Клієнт — фізична особа, яка переглядає товари, додає їх до кошика або оформлює замовлення на сайті.
          - paragraph [ref=e162]: 2.3. Готова прикраса — товар із каталогу Aurora Atelier, що має визначені характеристики та може бути доданий до кошика без індивідуального налаштування.
          - paragraph [ref=e163]: 2.4. Персоналізована прикраса — прикраса, створена або змінена за індивідуальними параметрами клієнта, зокрема через конструктор, вибір металу, каменю, розміру, гравіювання або іншої конфігурації.
          - paragraph [ref=e164]: 2.5. Замовлення — оформлений клієнтом запит на придбання готової прикраси або виготовлення персоналізованої прикраси.
        - generic [ref=e165]:
          - heading "3. Предмет договору" [level=2] [ref=e166]
          - paragraph [ref=e167]: 3.1. Aurora Atelier надає клієнту можливість обрати готову прикрасу з каталогу або сформувати індивідуальну конфігурацію прикраси за допомогою конструктора.
          - paragraph [ref=e168]: 3.2. Клієнт самостійно обирає товар, параметри прикраси, кількість, спосіб отримання та контактні дані для оформлення замовлення.
          - paragraph [ref=e169]: 3.3. Після оформлення замовлення Aurora Atelier отримує дані замовлення та обробляє його відповідно до обраних параметрів.
        - generic [ref=e170]:
          - heading "4. Оформлення замовлення" [level=2] [ref=e171]
          - paragraph [ref=e172]: 4.1. Для оформлення замовлення клієнт додає товар або персоналізовану прикрасу до кошика, заповнює контактні дані та підтверджує замовлення.
          - paragraph [ref=e173]: 4.2. Перед підтвердженням замовлення клієнт зобов’язаний перевірити склад кошика, кількість товарів, обрані параметри прикраси, розмір, матеріал, камінь, гравіювання та інші характеристики.
          - paragraph [ref=e174]: 4.3. Після оформлення замовлення клієнт отримує підтвердження замовлення на сайті або через контактні дані, зазначені під час оформлення.
          - paragraph [ref=e175]: 4.4. Якщо в замовленні виявлено помилку, клієнт має звернутися до Aurora Atelier якомога швидше до початку обробки або виготовлення замовлення.
        - generic [ref=e176]:
          - heading "5. Персоналізовані прикраси" [level=2] [ref=e177]
          - paragraph [ref=e178]: 5.1. Персоналізованою вважається прикраса, створена або налаштована відповідно до індивідуальних параметрів клієнта.
          - paragraph [ref=e179]: 5.2. До персоналізованих прикрас належать вироби, створені через конструктор, вироби з індивідуальним вибором металу, каменю, розміру, гравіювання або іншої конфігурації.
          - paragraph [ref=e180]: 5.3. Клієнт підтверджує, що перед оформленням замовлення перевірив усі параметри персоналізованої прикраси.
          - paragraph [ref=e181]: 5.4. Після початку обробки або виготовлення персоналізованого замовлення зміна параметрів може бути обмежена або неможлива.
          - paragraph [ref=e182]: 5.5. Умови повернення персоналізованих прикрас визначаються цією офертою та сторінкою “Повернення та обмін”.
        - generic [ref=e183]:
          - heading "6. Ціни та оплата" [level=2] [ref=e184]
          - paragraph [ref=e185]: 6.1. Ціни на сайті зазначаються у гривнях.
          - paragraph [ref=e186]: 6.2. Вартість готової прикраси визначається відповідно до ціни, вказаної в каталозі.
          - paragraph [ref=e187]: 6.3. Вартість персоналізованої прикраси може залежати від обраного типу виробу, металу, каменю, розміру, додаткових параметрів та комплектації.
          - paragraph [ref=e188]: 6.4. Остаточна вартість замовлення відображається в кошику перед підтвердженням замовлення.
          - paragraph [ref=e189]: 6.5. Оплата здійснюється доступним на сайті способом. Якщо на сайті реалізовано тестовий або демонстраційний режим оплати, це має бути зазначено в інтерфейсі проєкту.
        - generic [ref=e190]:
          - heading "7. Доставка та отримання" [level=2] [ref=e191]
          - paragraph [ref=e192]: 7.1. Умови доставки залежать від обраного способу отримання, міста та служби доставки.
          - paragraph [ref=e193]: 7.2. Орієнтовні строки доставки або виготовлення можуть відображатися на сайті або уточнюватися після оформлення замовлення.
          - paragraph [ref=e194]: 7.3. Для персоналізованих прикрас строк виконання може бути довшим, оскільки виріб створюється за індивідуальними параметрами клієнта.
          - paragraph [ref=e195]: 7.4. Aurora Atelier не несе відповідальності за затримки, спричинені службою доставки, якщо замовлення було своєчасно передано перевізнику.
        - generic [ref=e196]:
          - heading "8. Якість, гарантія та догляд" [level=2] [ref=e197]
          - paragraph [ref=e198]: 8.1. Aurora Atelier прагне передавати клієнтам прикраси належної якості, що відповідають опису товару або погодженим параметрам персоналізованого замовлення.
          - paragraph [ref=e199]: 8.2. Клієнт має право звернутися щодо якості виробу, якщо виявлено дефект, пошкодження або невідповідність замовленню.
          - paragraph [ref=e200]: 8.3. Гарантійні звернення розглядаються індивідуально з урахуванням характеру виробу, умов експлуатації та причини звернення.
          - paragraph [ref=e201]: 8.4. Гарантія не поширюється на пошкодження, спричинені неправильним використанням, механічним впливом, контактом із агресивними речовинами або порушенням рекомендацій з догляду.
        - generic [ref=e202]:
          - heading "9. Повернення та обмін" [level=2] [ref=e203]
          - paragraph [ref=e204]: 9.1. Умови повернення та обміну описані на сторінці “Повернення та обмін”.
          - paragraph [ref=e205]: 9.2. Готові прикраси можуть бути повернуті або обміняні відповідно до умов, зазначених на сайті та вимог законодавства України.
          - paragraph [ref=e206]: 9.3. Персоналізовані прикраси, виготовлені за індивідуальними параметрами клієнта, не підлягають стандартному поверненню як товар належної якості, якщо вони не мають дефектів або невідповідностей з боку Aurora Atelier.
          - paragraph [ref=e207]: 9.4. Якщо виріб має дефект, пошкодження або не відповідає погодженим параметрам замовлення з вини Aurora Atelier, звернення клієнта розглядається індивідуально.
        - generic [ref=e208]:
          - heading "10. Персональні дані" [level=2] [ref=e209]
          - paragraph [ref=e210]: 10.1. Під час оформлення замовлення Aurora Atelier обробляє персональні дані клієнта, необхідні для прийняття, обробки та виконання замовлення.
          - paragraph [ref=e211]: 10.2. До таких даних можуть належати ім’я, номер телефону, електронна пошта, адреса доставки та інформація про склад замовлення.
          - paragraph [ref=e212]: 10.3. Детальні умови обробки персональних даних описані на сторінці “Політика конфіденційності”.
        - generic [ref=e213]:
          - heading "11. Відповідальність сторін" [level=2] [ref=e214]
          - paragraph [ref=e215]: 11.1. Клієнт відповідає за правильність даних, зазначених під час оформлення замовлення.
          - paragraph [ref=e216]: 11.2. Aurora Atelier не несе відповідальності за неможливість виконання замовлення, якщо клієнт надав неправильні контактні дані або не відповідає на повідомлення щодо уточнення замовлення.
          - paragraph [ref=e217]: 11.3. Aurora Atelier не несе відповідальності за відмінності у відтінках матеріалів або каменів, що можуть виникати через налаштування екрана клієнта, освітлення або особливості візуалізації товару на сайті.
        - generic [ref=e218]:
          - heading "12. Зміни до оферти" [level=2] [ref=e219]
          - paragraph [ref=e220]: 12.1. Aurora Atelier може оновлювати умови цієї Публічної оферти.
          - paragraph [ref=e221]: 12.2. Актуальна редакція оферти завжди розміщується на цій сторінці.
          - paragraph [ref=e222]: 12.3. До замовлення застосовуються умови оферти, чинні на момент оформлення замовлення.
        - generic [ref=e223]:
